<svg xmlns="http://www.w3.org/2000/svg" width="480" height="426" viewBox="0 0 480 426">
  <defs>
    <linearGradient id="mr-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1d4ed8"/>
      <stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
    <clipPath id="mr-round">
      <rect width="480" height="426" rx="14"/>
    </clipPath>
  </defs>
  <g clip-path="url(#mr-round)">
    <rect width="480" height="426" fill="url(#mr-bg)"/>

    <!-- Browser chrome -->
    <rect width="480" height="34" fill="#142d6e"/>
    <circle cx="18" cy="17" r="4.5" fill="#ef4444"/>
    <circle cx="34" cy="17" r="4.5" fill="#f59e0b"/>
    <circle cx="50" cy="17" r="4.5" fill="#22c55e"/>
    <rect x="80" y="9" width="320" height="16" rx="8" fill="#1c3a85"/>
    <text x="95" y="20.5" font-family="Arial, sans-serif" font-size="10" fill="#b9c8f2">malirent-website.vercel.app</text>

    <!-- Sidebar -->
    <rect x="0" y="34" width="86" height="392" fill="#16234f"/>
    <text x="18" y="62" font-family="Georgia, serif" font-weight="700" font-size="14" fill="#ffffff">MaliRent</text>
    <rect x="14" y="84" width="58" height="22" rx="6" fill="#1d4ed8"/>
    <text x="22" y="98.5" font-family="Arial, sans-serif" font-size="9" fill="#fff">Dashboard</text>
    <text x="22" y="130" font-family="Arial, sans-serif" font-size="9" fill="#8fa1d6">Properties</text>
    <text x="22" y="156" font-family="Arial, sans-serif" font-size="9" fill="#8fa1d6">Tenants</text>
    <text x="22" y="182" font-family="Arial, sans-serif" font-size="9" fill="#8fa1d6">Payments</text>
    <text x="22" y="208" font-family="Arial, sans-serif" font-size="9" fill="#8fa1d6">Reports</text>

    <!-- Top bar -->
    <rect x="86" y="34" width="394" height="46" fill="#ffffff"/>
    <text x="106" y="62" font-family="Georgia, serif" font-weight="700" font-size="15" fill="#16234f">Properties Overview</text>
    <circle cx="420" cy="57" r="14" fill="#dbe4fb"/>
    <text x="414" y="61" font-family="Arial, sans-serif" font-size="10" fill="#1d4ed8" font-weight="700">EW</text>
    <rect x="442" y="50" width="22" height="14" rx="7" fill="#dbe4fb"/>

    <!-- Stat cards -->
    <g>
      <rect x="106" y="94" width="112" height="58" rx="9" fill="#ffffff"/>
      <text x="120" y="115" font-family="Arial, sans-serif" font-size="9" fill="#7c8bb5">Total Units</text>
      <text x="120" y="138" font-family="Georgia, serif" font-weight="700" font-size="19" fill="#16234f">48</text>
    </g>
    <g>
      <rect x="226" y="94" width="112" height="58" rx="9" fill="#ffffff"/>
      <text x="240" y="115" font-family="Arial, sans-serif" font-size="9" fill="#7c8bb5">Occupied</text>
      <text x="240" y="138" font-family="Georgia, serif" font-weight="700" font-size="19" fill="#15803d">42</text>
    </g>
    <g>
      <rect x="346" y="94" width="114" height="58" rx="9" fill="#ffffff"/>
      <text x="360" y="115" font-family="Arial, sans-serif" font-size="9" fill="#7c8bb5">Rent Due</text>
      <text x="360" y="138" font-family="Georgia, serif" font-weight="700" font-size="16" fill="#16234f">Ksh 1.2M</text>
    </g>

    <!-- Property list header -->
    <text x="106" y="178" font-family="Arial, sans-serif" font-weight="700" font-size="11" fill="#ffffff">Recent Properties</text>

    <!-- Property card 1 -->
    <g>
      <rect x="106" y="190" width="354" height="58" rx="9" fill="#ffffff"/>
      <rect x="116" y="200" width="38" height="38" rx="6" fill="#cfe0ff"/>
      <path d="M122 226v-10l13-9 13 9v10z" fill="none" stroke="#1d4ed8" stroke-width="1.6"/>
      <text x="164" y="214" font-family="Arial, sans-serif" font-weight="700" font-size="10.5" fill="#16234f">Kileleshwa Apartments — A4</text>
      <text x="164" y="228" font-family="Arial, sans-serif" font-size="9" fill="#7c8bb5">2 Bed · Nairobi</text>
      <rect x="380" y="208" width="62" height="20" rx="10" fill="#dcfce7"/>
      <text x="391" y="222" font-family="Arial, sans-serif" font-size="8.5" fill="#15803d" font-weight="700">Paid</text>
    </g>

    <!-- Property card 2 -->
    <g>
      <rect x="106" y="254" width="354" height="58" rx="9" fill="#ffffff"/>
      <rect x="116" y="264" width="38" height="38" rx="6" fill="#ffe7c2"/>
      <path d="M122 290v-10l13-9 13 9v10z" fill="none" stroke="#c18f59" stroke-width="1.6"/>
      <text x="164" y="278" font-family="Arial, sans-serif" font-weight="700" font-size="10.5" fill="#16234f">Lavington Court — B2</text>
      <text x="164" y="292" font-family="Arial, sans-serif" font-size="9" fill="#7c8bb5">3 Bed · Nairobi</text>
      <rect x="372" y="272" width="70" height="20" rx="10" fill="#fef3c7"/>
      <text x="380" y="286" font-family="Arial, sans-serif" font-size="8.5" fill="#b45309" font-weight="700">Due Soon</text>
    </g>

    <!-- Property card 3 -->
    <g>
      <rect x="106" y="318" width="354" height="58" rx="9" fill="#ffffff"/>
      <rect x="116" y="328" width="38" height="38" rx="6" fill="#d6e8ff"/>
      <path d="M122 354v-10l13-9 13 9v10z" fill="none" stroke="#1d4ed8" stroke-width="1.6"/>
      <text x="164" y="342" font-family="Arial, sans-serif" font-weight="700" font-size="10.5" fill="#16234f">Westlands Heights — C1</text>
      <text x="164" y="356" font-family="Arial, sans-serif" font-size="9" fill="#7c8bb5">1 Bed · Nairobi</text>
      <rect x="380" y="336" width="62" height="20" rx="10" fill="#dcfce7"/>
      <text x="391" y="350" font-family="Arial, sans-serif" font-size="8.5" fill="#15803d" font-weight="700">Paid</text>
    </g>

    <text x="106" y="402" font-family="Arial, sans-serif" font-size="9.5" fill="#b9c8f2">+ 45 more units across Nairobi</text>
  </g>
  <rect x="0.75" y="0.75" width="478.5" height="424.5" rx="13.25" fill="none" stroke="#142d6e" stroke-width="1.5"/>
</svg>
