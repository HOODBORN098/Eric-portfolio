      <text x="254" y="286" font-family="Arial, sans-serif" font-size="10.5" font-weight="600" fill="#14321f">Fresh Milk 1L</text>
      <text x="254" y="300" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#15803d">Ksh 65</text>
